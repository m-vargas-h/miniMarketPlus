spring.application.name=minimarket

# Configuracion de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuracion de la consola H2 
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Indica a Spring Boot que ejecute data.sql DESPUES de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.devtools.restart.enabled=false

# DEBUGGING 
# logging.level.org.springframework.security=DEBUG